[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "curl"]

[phases.install]
cmds = [
  "npm install",
  "curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ./yt-dlp && chmod +x ./yt-dlp && echo 'yt-dlp OK' || echo 'yt-dlp download FAILED'"
]

[start]
cmd = "node index.js"
